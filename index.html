<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://detectthefruit.github.io/">

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: system-ui, sans-serif;
    text-align: center;
  }

  h2 {
    margin-top: 20px;
    font-size: 28px;
    font-weight: 600;
  }

  #cam {
    width: 90vw;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 16px;
    border: 4px solid #333;
  }

  #label {
    margin-top: 16px;
    font-size: 32px;
    font-weight: 700;
  }

  .listening-indicator {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.7;
  }

  .pulse {
    animation: pulse 1s infinite;
    color: #ff4444;
  }

  @keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
  }
</style>
</head>

<body>

<h2>Fruit Classifier</h2>

<video id="cam" autoplay playsinline></video>
<div id="label">Loading...</div>

<div id="listenStatus" class="listening-indicator">Listening…</div>

<audio id="ding" src="ding.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script>
let model;
let currentPrediction = "Unknown";

// -------------------- CROP LIKE TEACHABLE MACHINE --------------------
function cropToSquare(video) {
  const size = Math.min(video.videoWidth, video.videoHeight);
  const startX = (video.videoWidth - size) / 2;
  const startY = (video.videoHeight - size) / 2;

  return tf.browser.fromPixels(video)
    .slice([startY, startX, 0], [size, size, 3])
    .resizeNearestNeighbor([224, 224])
    .toFloat()
    .expandDims(0);
}

// -------------------- LOAD MODEL + CAMERA --------------------
async function start() {
  model = await tf.loadLayersModel("model/model.json");

  const video = document.getElementById("cam");
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  // Prediction loop
  setInterval(async () => {
    if (!video.videoWidth) return;

    const img = cropToSquare(video);
    const prediction = model.predict(img);
    const index = prediction.argMax(-1).dataSync()[0];

    // Adjust based on your metadata.json order
    if (index === 0) currentPrediction = "an apple";
    else if (index === 1) currentPrediction = "an orange";
    else currentPrediction = "something I don't recognize";

    document.getElementById("label").innerText = currentPrediction;

    img.dispose();
    prediction.dispose();
  }, 200);
}

start();

// -------------------- ALWAYS-LISTENING SPEECH RECOGNITION --------------------
let recognition;
const ding = document.getElementById("ding");
const listenStatus = document.getElementById("listenStatus");

const wakePhrases = [
  "what is this",
  "what am i looking at",
  "identify this",
  "what do you see",
  "tell me what this is"
];

function startRecognition() {
  if (!("webkitSpeechRecognition" in window)) return;

  recognition = new webkitSpeechRecognition();
  recognition.continuous = true;
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    ding.play();
    listenStatus.classList.add("pulse");
  };

  recognition.onend = () => {
    listenStatus.classList.remove("pulse");
    setTimeout(startRecognition, 300); // restart automatically
  };

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();

    for (let phrase of wakePhrases) {
      if (transcript.includes(phrase)) {
        speak("This is " + currentPrediction);
        break;
      }
    }
  };

  recognition.start();
}

startRecognition();

// -------------------- SPEECH SYNTHESIS --------------------
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  // Try to pick a natural voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.toLowerCase().includes("google")
  );
  if (preferred) msg.voice = preferred;

  msg.rate = 1;
  msg.pitch = 1;

  window.speechSynthesis.speak(msg);
}
</script>

</body>
</html>
