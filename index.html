<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: system-ui, sans-serif;
    text-align: center;
  }

  h2 {
    margin-top: 20px;
    font-size: 28px;
    font-weight: 600;
  }

  #cam {
    width: 90vw;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 16px;
    border: 4px solid #333;
  }

  #label {
    margin-top: 16px;
    font-size: 32px;
    font-weight: 700;
  }

  #listenBtn {
    margin-top: 30px;
    padding: 20px 40px;
    font-size: 24px;
    border: none;
    border-radius: 50px;
    background: #4CAF50;
    color: white;
    font-weight: 700;
    width: 80vw;
    max-width: 350px;
    cursor: pointer;
    transition: 0.2s;
  }

  #listenBtn:active {
    transform: scale(0.96);
  }

  .listening {
    animation: pulse 1s infinite;
    background: #ff4444 !important;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0px 0px rgba(255,0,0,0.6); }
    100% { box-shadow: 0 0 25px 10px rgba(255,0,0,0); }
  }
</style>
</head>

<body>

<h2>Fruit Classifier</h2>

<video id="cam" autoplay playsinline></video>
<div id="label">Loading...</div>

<button id="listenBtn">Tap to Ask</button>

<audio id="ding" src="ding.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script>
let model;
let currentPrediction = "Unknown";

// -------------------- MODEL + CAMERA --------------------
async function start() {
  model = await tf.loadLayersModel("model/model.json");

  const video = document.getElementById("cam");
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  setInterval(async () => {
    const img = tf.browser.fromPixels(video)
      .resizeNearestNeighbor([224,224])
      .toFloat()
      .expandDims(0);

    const prediction = model.predict(img);
    const index = prediction.argMax(-1).dataSync()[0];

    if (index === 0) currentPrediction = "Apple";
    else if (index === 1) currentPrediction = "Orange";
    else currentPrediction = "Neither";

    document.getElementById("label").innerText = currentPrediction;

    img.dispose();
    prediction.dispose();
  }, 200);
}

start();

// -------------------- SPEECH RECOGNITION --------------------
const listenBtn = document.getElementById("listenBtn");
const ding = document.getElementById("ding");

let recognition;
const wakePhrases = [
  "what is this",
  "what am i looking at",
  "identify this",
  "what do you see",
  "tell me what this is",
  "what fruit is this"
];

if ("webkitSpeechRecognition" in window) {
  recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    listenBtn.classList.add("listening");
    ding.play();
  };

  recognition.onend = () => {
    listenBtn.classList.remove("listening");
  };

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript.toLowerCase();

    for (let phrase of wakePhrases) {
      if (transcript.includes(phrase)) {
        speak(currentPrediction);
        break;
      }
    }
  };
}

listenBtn.onclick = () => {
  if (recognition) recognition.start();
};

// -------------------- SPEECH SYNTHESIS --------------------
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  // Try to pick a natural-sounding voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.toLowerCase().includes("female") ||
    v.name.toLowerCase().includes("samantha") ||
    v.name.toLowerCase().includes("google")
  );
  if (preferred) msg.voice = preferred;

  msg.rate = 1;
  msg.pitch = 1;
  window.speechSynthesis.speak(msg);
}
</script>

</body>
</html>
